<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./index.css" type="text/css" />
  <title>Projects — Anjali Kanakan</title>
  <meta name="description" content="Projects built by Anjali Kanakan — side experiments to production applications." />
  <style>
    .card {
      background-color: var(--card);
      color: var(--card-foreground);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: 0 1px 3px #0000001a;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 6px #0000001a, 0 2px 4px #0000001a; }

    .card-header { padding: 1.5rem 1.5rem 0; }
    .card-body   { padding: 1rem 1.5rem 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 1rem; }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: calc(var(--radius) + 4px) calc(var(--radius) + 4px) 0 0;
      display: block;
    }
    .card-title {
      font-size: 1.25rem; font-weight: 600;
      transition: color .15s;
    }
    .card:hover .card-title { color: var(--primary); }

    .badge {
      display: inline-flex; align-items: center;
      padding: .125rem .5rem;
      border-radius: calc(var(--radius) - 2px);
      font-size: .75rem; font-weight: 500;
      background-color: var(--secondary);
      color: var(--secondary-foreground);
      border: 1px solid transparent;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 1.5rem;
    }
    @media (min-width: 48rem) {
      .projects-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* Mobile nav drawer */
    .mobile-menu { display: none; }
    .mobile-menu.open { display: flex; }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-background text-foreground">

  <!-- ── HEADER (Projects link marked active) ── -->

    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a class="text-xl font-bold tracking-tight hover:text-primary transition-colors" href="/">Anjali Kanakan</a>

      <nav class="hidden md:flex items-center gap-6">
        <a href="/" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">About</a>
        <a href="resume" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Resume</a>
        <a href="projects" class="text-sm font-semibold text-foreground transition-colors" aria-current="page">Projects</a>

      </nav>

      <button id="menu-btn" class="md:hidden p-2 rounded-md hover:bg-accent transition-colors" aria-label="Toggle menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"

    </div>

    <!-- Mobile dropdown -->
    <div id="mobile-menu" class="mobile-menu md:hidden flex-col gap-4 p-4 pb-4 border-t border-border bg-background">
      <a href="/" class="block py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">About</a>
      <a href="resume" class="block py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Resume</a>
      <a href="projects" class="block py-2 text-sm font-semibold text-foreground" aria-current="page">Projects</a>
      <a href="contact" class="block py-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Contact</a>

  </header>

  <!-- ── MAIN ── -->

  <!-- ── FOOTER ── -->

      <div class="flex items-center gap-4">
        <a href="https://github.com/anjalikanakan" target="_blank" rel="noopener noreferrer"
           aria-label="GitHub" class="text-muted-foreground hover:text-foreground transition-colors">

               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
            <path d="M9 18c-4.51 2-5-2-7-2"/>

        </a>
        <a href="https://www.linkedin.com/in/anjali-kanakan-138888116" target="_blank" rel="noopener noreferrer"
           aria-label="LinkedIn" class="text-muted-foreground hover:text-foreground transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/>

  </footer>

  <script>
    document.getElementById("footer-year").textContent = new Date().getFullYear();

    /* ── Mobile menu toggle ── */
    const menuBtn    = document.getElementById("menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");
    menuBtn.addEventListener("click", () => {
      const open = mobileMenu.classList.toggle("open");
      menuBtn.setAttribute("aria-expanded", open);
    });

    /* ── DATA ───────────────────────────────────────────────────────
       Edit this array to add, remove, or update projects.
       Fields: title, description, tags[], github (optional), liveUrl (optional)
    ────────────────────────────────────────────────────────────────*/
    const PROJECTS = [
      {
        title:       "Qatar University",
        image:       "images/QU-page.png",
        description: "Built and customized Drupal CMS themes using Twig templates, SASS, and Bootstrap — delivering accessible, multilingual front-end interfaces with custom block layouts, responsive design, and WCAG-compliant styling aligned to brand guidelines.",
        tags:        ["Drupal CMS", "HTML5", "SASS", "JavaScript ES6+", "Twig", "Bootstrap", "Docker"],
        liveUrl:     "https://qatar-university.applab.qa",
      },
      {
        title:       "Qatar News Agency",
        image:       "images/qna-page.png",
        description: "Developed a responsive news portal front end using React.js, integrating RESTful APIs powered by .NET and a MySQL database — featuring dynamic article listings, category filtering, and a performant, accessible UI optimised for high-traffic media consumption.",
        tags:        ["React", ".NET", "MySQL", "REST API", "HTML/CSS", "Javascript ES6+"],
        liveUrl:     "https://www.qna.org.qa",
      },
      {
        title:       "Qatar Civil Aviation Authority",
        image:       "images/CAA-page.png",
        description: "Built dynamic, data-driven web applications using React.js and Redux for state management — integrating jQuery and JavaScript ES6+ for interactive UI components, with Drupal CMS custom theming and responsive HTML/CSS layouts across multiple client projects.",
        tags:        ["React Js", "Redux", "Drupal CMS", "Javascript ES6+", "HTML/CSS", "JQuery"],
        liveUrl:     "https://caa.gov.qa",
      },
      {
        title:       "DAAM",
        image:       "images/daam-page.png",
        description: "Delivered full-stack web solutions using React.js and Bootstrap for responsive front-end interfaces, integrated with Drupal CMS for content management, and deployed via Docker — with JavaScript powering interactive features and custom HTML/CSS for pixel-perfect styling.",
        tags:        ["React", "Drupal CMS", "HTML/CSS", "Javascript", "Bootstrap", "Docker"],
        liveUrl:      "https://www.daam.gov.qa",
      },
      {
        title:       "MEPLINKS",
        image:       "images/meplinks-page.png",
        description: "An online platform for selling Surplus electromechanical inventory. Client comes with an idea and wants to automize most of the functionalities in the project starting from finding the suitable sellers, uploading their products, listing it for sales, easy checkout, and delivery process.",
        tags:        ["React js", "GraphQL", "HTML/CSS", "Javascript", "Bootstrap"],
        liveUrl:      "https://www.meplinks.com",
      },
      {
        title:       "Jersey Manufacturing",

        tags:        ["React js", "GraphQL", "HTML/CSS", "Javascript", "Bootstrap"],
        liveUrl:      "https://www.jerseymfg.com",
      },
      {
        title:       "CGVTS",
        image:       "images/cgvts-page.png",
        description: "Specializes in advanced vehicle tracking systems that offer real-time tracking, monitoring, and analysis of fleets. Utilizing GPS technology and sophisticated software, the vehicle tracking solutions help businesses optimize routes, reduce fuel consumption, and improve overall fleet management.",
        tags:        ["React js", "Material UI", "React Leaflet", "HTML/CSS", "Javascript", "Bootstrap"],
        liveUrl:      "https://cgvts.trackolet.in/",
      },
      {
        title:       "Resource Portal",
        image:       "images/jesi.page.png",
        description: "A solution for streamlined employee management. Enhance productivity and maintain a systematic record of resource activities, ensuring optimal utilization of quality time without schedule delays. Helps to elevate company's efficiency with our powerful application.",
        tags:        ["React js", "Angular", "HTML/CSS", "Javascript", "Bootstrap"],
        liveUrl:      "https://rp.jerseyeng.com/",
      },
     
    ];

    /* ── Helpers ── */
    function el(tag, cls, ...children) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      for (const child of children.flat()) {
        if (child == null) continue;
        node.append(typeof child === "string" ? document.createTextNode(child) : child);
      }
      return node;
    }

    function attr(node, attrs) {
      for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
      return node;
    }

    function svgIcon(paths, size = 16) {
      const ns  = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      attr(svg, { width: size, height: size, viewBox: "0 0 24 24",
                  fill: "none", stroke: "currentColor",
                  "stroke-width": "2", "stroke-linecap": "round", "stroke-linejoin": "round" });
      for (const d of [].concat(paths)) {
        const p = document.createElementNS(ns, "path");
        p.setAttribute("d", d);
        svg.appendChild(p);
      }
      return svg;
    }

    /* ── Icon paths ── */
    const ICON = {
      folderOpen:   ["m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"],
      github:       ["M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4", "M9 18c-4.51 2-5-2-7-2"],
      externalLink: ["M15 3h6v6", "M10 14 21 3", "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"],
    };

    /* ── Render a single project card ── */
    function renderCard(project) {
      const tags = el("div", "flex flex-wrap gap-2",
        ...project.tags.map(t => el("span", "badge", t))
      );

      const links = el("div", "flex gap-4 pt-1");
      if (project.github) {
        const a = attr(el("a", "inline-flex items-center gap-1 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors"),
          { href: project.github, target: "_blank", rel: "noopener noreferrer" });
        a.append(svgIcon(ICON.github, 15), " GitHub");
        links.appendChild(a);
      }
      if (project.liveUrl) {
        const a = attr(el("a", "inline-flex items-center gap-1 text-sm font-medium text-primary hover:underline transition-colors"),
          { href: project.liveUrl, target: "_blank", rel: "noopener noreferrer" });
        a.append(svgIcon(ICON.externalLink, 15), " Live Demo");
        links.appendChild(a);
      }

      const img = project.image
        ? attr(document.createElement("img"), { src: project.image, alt: project.title, class: "card-image" })
        : null;

      return el("div", "card",
        img,
        el("div", "card-header",
          el("p", "card-title", project.title),
        ),
        el("div", "card-body",
          el("p", "text-muted-foreground leading-relaxed flex-1", project.description),
          tags,
          links,
        ),
      );
    }

    /* ── Main render ── */
    function render() {
      const root = document.getElementById("projects-root");

      const pageHeader = el("div", "space-y-3",
        el("div", "flex items-center gap-3",
          svgIcon(ICON.folderOpen, 28),
          el("h1", "text-5xl font-extrabold tracking-tight", "Projects"),
        ),
        el("p", "text-lg text-muted-foreground max-w-2xl",
          "A selection of projects I've built — from side experiments to production applications. Each one taught me something new."
        ),
      );

      const grid = el("div", "projects-grid", ...PROJECTS.map(renderCard));

      root.append(pageHeader, grid);
    }

    render();
  </script>
</body>
</html>
